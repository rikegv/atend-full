services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: atend-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: atend
      POSTGRES_PASSWORD: atend123
      POSTGRES_DB: atend
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
